    <script>
      window.googletag = window.googletag || {cmd: []};
      googletag.cmd.push(function() {
        // Enable Single Request Architecture (SRA) for better performance
        // SRA bundles requests for multiple ad slots into a single ad request
        googletag.pubads().enableSingleRequest();
        
        // Collapse empty divs globally to improve performance
        googletag.pubads().collapseEmptyDivs(true);
        
        // Note: Ad sizes match AD_SIZES constants in src/constants/adConfig.js
        // All sizes ordered largest to smallest for optimal fill
        
        // Top banner - width-based mapping
        // Sizes: 728x90, 468x60, 320x100, 320x50, 300x100, 300x50, 234x60
        var topBannerSizes = [[728, 90], [468, 60], [320, 100], [320, 50], [300, 100], [300, 50], [234, 60]];
        var topBannerMapping = googletag.sizeMapping()
          .addSize([728, 0], topBannerSizes)
          .addSize([468, 0], [[468, 60], [320, 100], [320, 50], [300, 100], [300, 50], [234, 60]])
          .addSize([320, 0], [[320, 100], [320, 50], [300, 100], [300, 50], [234, 60]])
          .addSize([300, 0], [[300, 100], [300, 50], [234, 60]])
          .addSize([234, 0], [[234, 60]])
          .addSize([0, 0], [[320, 50]])
          .build();
        googletag
          .defineSlot('/6355419/Travel/Europe/France/Paris', topBannerSizes, 'ad-top-banner')
          .defineSizeMapping(topBannerMapping)
          .addService(googletag.pubads());
        
        // Bottom banner - width-based mapping
        // Sizes: 970x90, 728x90, 468x60, 320x100, 320x50, 300x100, 300x50, 234x60
        var bottomBannerSizes = [[970, 90], [728, 90], [468, 60], [320, 100], [320, 50], [300, 100], [300, 50], [234, 60]];
        var bottomBannerMapping = googletag.sizeMapping()
          .addSize([970, 0], bottomBannerSizes)
          .addSize([728, 0], [[728, 90], [468, 60], [320, 100], [320, 50], [300, 100], [300, 50], [234, 60]])
          .addSize([468, 0], [[468, 60], [320, 100], [320, 50], [300, 100], [300, 50], [234, 60]])
          .addSize([320, 0], [[320, 100], [320, 50], [300, 100], [300, 50], [234, 60]])
          .addSize([300, 0], [[300, 100], [300, 50], [234, 60]])
          .addSize([234, 0], [[234, 60]])
          .addSize([0, 0], [[320, 50]])
          .build();
        googletag
          .defineSlot('/6355419/Travel/Europe/France/Paris', bottomBannerSizes, 'ad-bottom-banner')
          .defineSizeMapping(bottomBannerMapping)
          .addService(googletag.pubads());
        
        // Left sidebar - height-aware mapping
        // Sizes: 300x600, 160x600, 120x600
        var sidebarSizes = [[300, 600], [160, 600], [120, 600]];
        var sidebarMapping = googletag.sizeMapping()
          .addSize([300, 600], sidebarSizes)
          .addSize([160, 600], [[160, 600], [120, 600]])
          .addSize([120, 600], [[120, 600]])
          .addSize([0, 0], []) // Empty base to prevent loading below requirements
          .build();
        googletag
          .defineSlot('/6355419/Travel/Europe/France/Paris', sidebarSizes, 'ad-sidebar-left')
          .defineSizeMapping(sidebarMapping)
          .addService(googletag.pubads());
        
        // Right sidebar - height-aware mapping (same as left)
        googletag
          .defineSlot('/6355419/Travel/Europe/France/Paris', sidebarSizes, 'ad-sidebar-right')
          .defineSizeMapping(sidebarMapping)
          .addService(googletag.pubads());
        
        // Interstitial - height-aware mapping
        // Sizes: 480x320, 320x480, 336x280, 300x250
        var interstitialSizes = [[480, 320], [320, 480], [336, 280], [300, 250]];
        var interstitialMapping = googletag.sizeMapping()
          .addSize([480, 320], [[480, 320], [336, 280], [300, 250]])
          .addSize([336, 280], [[336, 280], [300, 250]])
          .addSize([320, 480], [[320, 480], [300, 250]])
          .addSize([300, 250], [[300, 250]])
          .addSize([0, 0], [[300, 250]])
          .build();
        googletag
          .defineSlot('/6355419/Travel/Europe/France/Paris', interstitialSizes, 'ad-interstitial')
          .defineSizeMapping(interstitialMapping)
          .addService(googletag.pubads());
        
        googletag.enableServices();
      });
